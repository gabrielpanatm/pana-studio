name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tagul existent pentru care se construiește draftul de release
        required: true
        default: v0.1.0
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-appimage:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Verify frontend and licence inventory
        run: |
          npm run check
          npm run test:kernel
          npm run licenses:check

      - name: Build AppImage and create draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Pană Studio ${{ env.RELEASE_TAG }}
          releaseBody: |
            Primul preview public Pană Studio pentru Linux x86_64.

            Verifică fișierul AppImage cu fișierul `.sha256` înainte de rulare.
            Acest preview nu este încă semnat criptografic.
          releaseDraft: true
          prerelease: true
          generateReleaseNotes: true

      - name: Create and upload AppImage checksum
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          bundle_dir="src-tauri/target/release/bundle/appimage"
          mapfile -d '' appimages < <(find "$bundle_dir" -maxdepth 1 -type f -name '*.AppImage' -print0)

          if [ "${#appimages[@]}" -ne 1 ]; then
            echo "Expected exactly one AppImage, found ${#appimages[@]}." >&2
            exit 1
          fi

          appimage_path="${appimages[0]}"
          remote_appimage_name="$(
            gh release view "$RELEASE_TAG" --json assets --jq \
              '[.assets[] | select(.name | endswith(".AppImage"))] | if length == 1 then .[0].name else error("Expected exactly one uploaded AppImage") end'
          )"
          checksum_path="$bundle_dir/${remote_appimage_name}.sha256"
          appimage_digest="$(sha256sum "$appimage_path" | cut -d ' ' -f 1)"

          printf '%s  %s\n' "$appimage_digest" "$remote_appimage_name" > "$checksum_path"

          gh release upload "$RELEASE_TAG" "$checksum_path" --clobber
