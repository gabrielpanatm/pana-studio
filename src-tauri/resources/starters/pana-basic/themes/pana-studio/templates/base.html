<!DOCTYPE html>
<html lang="{{ config.default_language | default(value='ro') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{ current_url | default(value=config.base_url) | safe }}">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ config.description }}{% endblock %}">
  <meta property="og:url" content="{{ current_url | default(value=config.base_url) | safe }}">
  <meta property="og:locale" content="ro_RO">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% block tw_title %}{{ config.title }}{% endblock %}">
  <meta name="twitter:description" content="{% block tw_description %}{{ config.description }}{% endblock %}">

  {% block preload_hero %}{% endblock %}

  <link rel="stylesheet" href="/css-framework/framework.css">
  {% block css_pagina %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
