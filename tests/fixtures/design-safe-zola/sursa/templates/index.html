<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ config.title }}</title>
    <style>
      body { margin: 0; font-family: sans-serif; background: #f6f8f7; color: #17211d; }
      main { display: grid; gap: 16px; padding: 32px; }
      .card { padding: 20px; border: 1px solid #9eb1a8; border-radius: 12px; background: white; }
    </style>
    <script>
      window.__panaUnsafeInlineRan = true;
      while (true) {}
    </script>
    <script type="module" src="/js/freeze.js"></script>
  </head>
  <body onload="window.__panaInlineHandlerRan = true">
    <main data-anim="fixture-main">
      <h1>Preview Design Safe</h1>
      <section class="card" data-anim="fixture-card-a">
        <h2>Card A</h2>
        <p>Acest element trebuie să rămână selectabil și mutabil.</p>
      </section>
      <section class="card" data-anim="fixture-card-b">
        <h2>Card B</h2>
        <p>Context-menu și CSS live trebuie să rămână funcționale.</p>
      </section>
      <iframe srcdoc="&lt;script&gt;while(true){}&lt;/script&gt;"></iframe>
      <a href="javascript:while(true){}">Navigare nesigură</a>
    </main>
  </body>
</html>
